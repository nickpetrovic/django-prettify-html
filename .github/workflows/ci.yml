name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheel
        run: |
          pip install maturin
          maturin build --out dist
      - name: Install and test
        # Install the built wheel + pytest, then run tests from a clean temp
        # directory to avoid the local django_prettify_html/ shadowing the
        # installed native extension.
        run: |
          pip install pytest
          pip install dist/*.whl
          mkdir -p "$RUNNER_TEMP/run_tests"
          cp -r tests/* "$RUNNER_TEMP/run_tests/"
          cd "$RUNNER_TEMP/run_tests"
          python -m pytest . -v --override-ini="rootdir=$RUNNER_TEMP/run_tests"
        shell: bash
