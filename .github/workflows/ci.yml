name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheel
        run: |
          pip install maturin
          maturin build --out dist
      - name: Install wheel and test deps
        run: pip install pytest dist/*.whl
        shell: bash
      - name: Run tests
        # Run from a temp dir so Python imports the installed package,
        # not the local django_prettify_html/ source directory.
        run: python -m pytest ${{ github.workspace }}/tests/ -v
        working-directory: ${{ runner.temp }}
        shell: bash
